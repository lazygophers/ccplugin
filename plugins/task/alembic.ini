# Alembic 配置文件
# Task Plugin 数据库迁移管理

[alembic]
# 迁移脚本存放路径
script_location = alembic

# 迁移脚本模板文件
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区设置
timezone = UTC

# 数据库连接 URL
# 格式：sqlite:///path/to/database.db
# 可通过环境变量 TASK_DATABASE_URL 覆盖
sqlalchemy.url = sqlite:///.task_data/tasks.db

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
