[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-plugin-task"
version = "0.1.0"
description = "Task Plugin for Claude Code - 任务管理"
requires-python = ">=3.10"
dependencies = ["mcp>=1.1.0", "pydantic>=2.0", "sqlalchemy>=2.0"]

[tool.setuptools]
packages = ["task"]

[tool.setuptools.package-dir]
"" = "src"
