# Claude Code Hooks 配置文件
# 复制到: ./.lazygophers/ccplugin/notify/config.yaml 或 ~/.lazygophers/ccplugin/notify/config.yaml
#
# 模板变量: {{ project_name }}, {{ session_id }}, {{ hook_event_name }}, {{ time_now }}
# 工具钩子额外: {{ tool_name }}, {{ file_path }}, {{ tool_input }}, {{ tool_response }}, {{ success }}
---
hooks:
  stop:
    enabled: true
    play_sound: true
    message: "{{ project_name }} 任务已完成"

  pre_tool_use:
    askuserquestion:
      enabled: true
      play_sound: true
      message: "{{ project_name }} 有问题需要你解决"
    # write/edit/read/bash/agent/webfetch/websearch 默认 false

  post_tool_use_failure:
    enabled: false
    message: "{{ project_name }} 工具 {{ tool_name }} 失败: {{ error }}"

  permission_request:
    enabled: false
    message: "{{ project_name }} 请求权限 ({{ tool_name }})"

  user_prompt_submit:
    enabled: false
    message: "{{ project_name }} 收到用户输入"

  notification:
    permission_prompt:
      enabled: true
      play_sound: true
      message: "权限请求: {{ message }}"
    idle_prompt:
      enabled: false
      message: "等待输入: {{ message }}"
    auth_success:
      enabled: false
      message: "认证成功: {{ message }}"
    elicitation_dialog:
      enabled: false
      message: "工具引出: {{ message }}"

  session_start:
    startup:
      enabled: false
      message: "{{ project_name }} 新会话"
    resume:
      enabled: false
      message: "{{ project_name }} 会话恢复"
    clear:
      enabled: false
      message: "{{ project_name }} 会话清空"
    compact:
      enabled: false
      message: "{{ project_name }} 会话压缩"

  session_end:
    clear:
      enabled: false
      message: "{{ project_name }} 会话清除"
    resume:
      enabled: false
      message: "{{ project_name }} 切换会话"
    logout:
      enabled: false
      message: "{{ project_name }} 用户注销"
    prompt_input_exit:
      enabled: false
      message: "{{ project_name }} 用户退出"
    bypass_permissions_disabled:
      enabled: false
      message: "{{ project_name }} 绕过权限禁用"
    other:
      enabled: false
      message: "{{ project_name }} 会话结束"

  subagent_start:
    enabled: false
    message: "{{ project_name }} 子代理 {{ agent_type }} 启动"

  subagent_stop:
    enabled: false
    message: "{{ project_name }} 子代理 {{ agent_type }} 完成"

  stop_failure:
    enabled: true
    play_sound: true
    message: "{{ project_name }} API 错误: {{ error }}"

  teammate_idle:
    enabled: false
    message: "{{ project_name }} 队友 {{ teammate_name }} 空闲"

  task_completed:
    enabled: false
    message: "{{ project_name }} 任务完成: {{ task_subject }}"

  instructions_loaded:
    enabled: false
    message: "{{ project_name }} 指令加载: {{ file_path }}"

  config_change:
    enabled: false
    message: "{{ project_name }} 配置变更: {{ source }}"

  cwd_changed:
    enabled: false
    message: "{{ project_name }} 工作目录变更"

  file_changed:
    enabled: false
    message: "{{ project_name }} 文件变更: {{ file_path }} ({{ event }})"

  worktree_create:
    enabled: false
    message: "{{ project_name }} Worktree 创建: {{ name }}"

  worktree_remove:
    enabled: false
    message: "{{ project_name }} Worktree 移除"

  pre_compact:
    manual:
      enabled: false
      message: "{{ project_name }} 手动压缩启动"
    auto:
      enabled: false
      message: "{{ project_name }} 自动压缩启动"

  post_compact:
    manual:
      enabled: false
      message: "{{ project_name }} 手动压缩完成"
    auto:
      enabled: false
      message: "{{ project_name }} 自动压缩完成"

  elicitation:
    enabled: false
    message: "{{ project_name }} MCP 请求: {{ message }}"

  elicitation_result:
    enabled: false
    message: "{{ project_name }} MCP 响应: {{ action }}"
