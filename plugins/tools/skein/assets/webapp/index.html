<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SKEIN · {{PROJ}}</title>
  <link rel="stylesheet" href="dist/app.css">
</head>
<body>
  <!-- 顶栏 (A 皮: 玻璃横梁; C 骨: logo + nav pill + search + theme toggle 分段)
       nav 高亮由 router.highlightNav 管 (匹配 href 首段加 .active)。 -->
  <header class="topbar">
    <strong class="logo"><span class="mark" aria-hidden="true"></span>SKEIN · {{PROJ}}</strong>
    <nav class="nav" aria-label="主导航">
      <a href="/dashboard" data-nav>📊 概览</a>
      <a href="/board" data-nav>📋 看板</a>
      <a href="/queue" data-nav>⏳ 队列</a>
      <a href="/task" data-nav>📄 任务</a>
      <a href="/spec" data-nav>📖 规范</a>
      <a href="/archive" data-nav>🗄 归档</a>
    </nav>
    <label class="search">
      <span aria-hidden="true">🔍</span>
      <input type="search" id="global-search" placeholder="搜索 id / 名称 / 描述…" autocomplete="off" aria-label="全局搜索">
    </label>
    <!-- 主题 toggle (浅晨曦 / 暗夜金沙); app.js 记忆 data-theme 到 localStorage + 默认跟随系统 -->
    <div class="theme-toggle" role="group" aria-label="外观切换">
      <button type="button" data-theme-btn="light" aria-label="浅色">☀</button>
      <button type="button" data-theme-btn="dark" aria-label="暗色">☾</button>
    </div>
  </header>

  <!-- SPA 挂载点: 各 hash 路由页面渲染进此处 (pages/*.js 下游负责, 契约 render(mount, params, ctx)) -->
  <main id="view"></main>

  <!-- petite-vue 引导: app.js 载入 petite-vue (vendored) + 挂 #view + hash router + 全局搜索/主题/动效 -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
