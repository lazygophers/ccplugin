<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SKEIN · {{PROJ}}</title>
  <link rel="stylesheet" href="dist/app.css">
</head>
<body>
  <!-- 顶栏 (A 皮: 玻璃横梁; C 骨: logo + nav pill + search + theme toggle 分段)
       nav 高亮由 router.highlightNav 管 (匹配 href 首段加 .active)。 -->
  <header class="topbar">
    <strong class="logo"><span class="mark" aria-hidden="true"></span>SKEIN · {{PROJ}}</strong>
    <nav class="nav" aria-label="主导航">
      <a href="/dashboard" data-nav><svg class="nav-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>概览</a>
      <a href="/board" data-nav><svg class="nav-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>看板</a>
      <a href="/queue" data-nav><svg class="nav-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>队列</a>
      <a href="/task" data-nav><svg class="nav-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>任务</a>
      <a href="/spec" data-nav><svg class="nav-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>规范</a>
      <a href="/archive" data-nav><svg class="nav-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><line x1="10" y1="12" x2="14" y2="12"/></svg>归档</a>
    </nav>
    <label class="search">
      <span aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="search" id="global-search" placeholder="搜索 id / 名称 / 描述…" autocomplete="off" aria-label="全局搜索">
    </label>
    <!-- 设置 (齿轮) → config 模态 (表单/YAML 双 Tab 实时保存); app.js wireConfig 接管 -->
    <button type="button" id="config-btn" class="icon-btn" aria-label="设置" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <!-- 主题 toggle (浅晨曦 / 暗夜金沙); app.js 记忆 data-theme 到 localStorage + 默认跟随系统 -->
    <div class="theme-toggle" role="group" aria-label="外观切换">
      <button type="button" data-theme-btn="light" aria-label="浅色">☀</button>
      <button type="button" data-theme-btn="dark" aria-label="暗色">☾</button>
    </div>
  </header>

  <!-- SPA 挂载点: 各 hash 路由页面渲染进此处 (pages/*.js 下游负责, 契约 render(mount, params, ctx)) -->
  <main id="view"></main>

  <!-- petite-vue 引导: app.js 载入 petite-vue (vendored) + 挂 #view + hash router + 全局搜索/主题/动效 -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
