<!doctype html>
<html lang="zh-CN" data-theme="skein" data-motion="full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SKEIN</title>
  <link rel="stylesheet" href="dist/app.css">
</head>
<body>
  <!-- 顶栏: 7 nav tab (hash 路由) + 全局搜索 + 主题切换 -->
  <header class="topbar flex items-center gap-4 px-6 py-3 sticky top-0 z-50" style="background:var(--bg)">
    <strong class="text-head text-lg tracking-tight">SKEIN</strong>
    <nav class="nav flex items-center gap-1 text-sm">
      <a href="#/dashboard" data-nav>📊 概览</a>
      <a href="#/board" data-nav>📋 看板</a>
      <a href="#/queue" data-nav>⏳ 队列</a>
      <a href="#/task" data-nav>📄 任务</a>
      <a href="#/spec" data-nav>📖 规范</a>
      <a href="#/commands" data-nav>⌘ 命令</a>
      <a href="#/archive" data-nav>🗄 归档</a>
    </nav>
    <input type="search" id="global-search" class="search ml-auto w-[280px] rounded border px-3 py-1.5 text-sm"
           style="background:var(--card);color:var(--fg);border-color:var(--brd)"
           placeholder="🔍 搜索 id / 名称 / 描述…" autocomplete="off" aria-label="全局搜索">
    <label class="text-xs text-muted flex items-center gap-1">主题
      <select id="theme-select" class="rounded border px-1 py-0.5 text-xs"
              style="background:var(--sel-bg);color:var(--sel-fg);border-color:var(--brd)">
        <option value="skein">缕光</option>
        <option value="minimal">极简</option>
        <option value="terminal">终端</option>
        <option value="glass">磨砂</option>
        <option value="blueprint">蓝图</option>
        <option value="sketch">手绘</option>
        <option value="neumorphism">浮起</option>
        <option value="holographic">虹彩</option>
        <option value="magazine">杂志</option>
        <option value="sketchdark">夜绘</option>
      </select>
    </label>
  </header>

  <!-- SPA 挂载点: 各 hash 路由页面渲染进此处 (页面 subtask 负责) -->
  <main id="view" class="px-6 pb-10"></main>

  <!-- petite-vue 引导 (占位): app.js 由 s3 提供, import petite-vue (vendored) + 挂 #view + hash router -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
