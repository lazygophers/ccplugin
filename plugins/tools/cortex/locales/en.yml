meta:
  lang: en
  fallback: en
  display: English

dirs:
  # Top-level vault directories (dual namespace + system dirs)
  knowledge: knowledge
  memory: memory
  dashboard: dashboard
  archive: archive
  meta: _meta
  templates: _templates
  assets: _assets
  # Knowledge sub-layers (used by lint i18n-path mapping)
  projects: projects
  sources: sources
  domains: domains
  journal: journal
  reflection: reflection
  inbox: inbox
  # Alternate flat layout names (recognized but not generated)
  concepts: concepts
  entities: entities
  questions: questions
  fleeting: fleeting
  areas: areas
  resources: resources
  zettels: zettels
  structure-notes: structure-notes
  references: references

files:
  home: home
  domain_index: _domain
  subdir_index: _index

agent_titles:
  curator: cortex curator
  researcher: cortex researcher
  translator: cortex translator
  cartographer: cortex cartographer
  archivist: cortex archivist
  linker: cortex linker
  summarizer: cortex summarizer

prompts:
  archive_pending: 📝 cortex archived {path}
  stats_header: "### 📊 Inventory snapshot"
  l0_header: "### 🔒 L0 core memory (always-loaded, immutable)"
  triggers_header: "**Trigger keywords** (match → mandatory recall):"
  contract_header: "### ⚖️ Behavior contract (hard, non-skippable)"
  behavior_contract: |
    ⚠️ Mandatory flow (first tool call per user message):
    1. cortex_memory_recall(query)
    2. cortex_search(query)
    Skipping = contract violation.

    ⚠️ Memory directives (call immediately on keyword match):
    - "remember X" → memory_write level=L1 weight=0.85
    - "always/permanent X" → write candidates.md (L0 candidate, user approval)
    - "temporary X" → L2
    - "forget X" → memory_forget
    - After write reply: "✓ Saved L<N>: <brief>"
  default_triggers: "remember/forget/记住/忘了/preference/project/Go/Python/MySQL/React/finance/travel/food (details: _meta/triggers.yaml)"
  collab_compact: |
    Archive: cortex-save (project→domains/, concept→concepts/);
    Write: L1 obsidian CLI → L2 mcp → L3 direct (auth required);
    Auto ^cortex-<sha8>; Stop hook archives findings.
  session_header: "## Cortex connected (lang={lang}, vault={vault})"
  collab_save: After non-trivial findings, use cortex-save to archive; project-specific → domains/, general concepts → concepts/.
  collab_no_direct: |
    Do not write vault files directly. Fallback order:
    L1 = official obsidian CLI (read/create/files/search/move/property/daily, multi-vault via `vault=<name>`), requires Obsidian app running.
    L2 = mcp__obsidian__* (heading/block-anchor patch, canvas, full metadata graph, or when app is not running).
    L3 = direct file write (canvas/excalidraw JSON or other non-markdown, or when L1/L2 are unavailable). **MUST obtain user authorization via AskUserQuestion before writing.**
  collab_block_id: Each H2/H3 section gets a trailing ^cortex-<sha8> block-id for precise ![[note#^cortex-xxx]] references.
  collab_stop_hook: Stop hook auto-archives non-trivial technical findings to log/YYYY-MM/.
  cli_missing_warn: |
    ⚠️ **Official Obsidian CLI not enabled** — cortex L1 primary path unavailable; this session will degrade to L2 (mcp__obsidian__*) and L3 (direct write, needs authorization).
    Enable: Obsidian → Settings → General → Command line interface → Enable. Binary name `obsidian` (macOS auto-symlinks to /usr/local/bin/).
    **Assistant MUST proactively ask the user whether to enable it now** on the first reply, rather than silently degrading.
  l3_authorize_single: |
    cortex is about to write directly to disk (L1/L2 unavailable). Target: {path}
    Action: {action}
    Authorize?
  l3_authorize_batch: |
    cortex is about to batch-write directly to disk (L1/L2 unavailable). {count} files:
    {paths}
    Action: {action}
    Authorize the entire batch?
