prompts:
  archive_pending: 📝 cortex archived {path}
  stats_header: "### 📊 Inventory snapshot"
  l0_header: "### 🔒 L0 core memory (always-loaded, immutable)"
  triggers_header: "**Trigger keywords** (match → mandatory recall):"
  contract_header: "### ⚖️ Behavior contract (hard, non-skippable)"
  behavior_contract: |
    1. **Recall before answering**:
       - User query contains a trigger keyword → immediately call `mcp__cortex__cortex_memory_recall(query, top_k=5)`
       - Tech / project / concept involved → immediately call `mcp__cortex__cortex_search(query, scope=knowledge)`
       - Answering directly without recall = contract violation

    2. **Adoption rules for recalled items**:
       - weight ≥ 0.7: MUST adopt, treat as fact
       - weight 0.4-0.7: quote + label "memory source"
       - weight < 0.4: optional reference, not binding

    3. **Explicit user memory instructions** (proactive write):
       - User says "remember X" / "please remember" / "don't forget X" / "记住 X" → immediately call `cortex_memory_write`
       - Level decision:
         · "remember forever" / "hard rule" / "absolute" / "永远记住" → propose L0 (write to candidates.md, user approval required)
         · "remember" / "记住" default tone → L1 (weight=0.85)
         · "short-term" / "temporarily" / "暂时" → L2 (weight=0.6)
       - After write, reply: "✓ Saved to L<N>: <one-line brief>"
       - User says "forget X" / "忘了 X" → cortex_memory_forget

    4. **Write rules**:
       - Implicit new user preference / constraint → cortex_memory_write L1 (weight ≥ 0.8)
       - Promotion to L0 requires explicit user approval (never auto)

    5. hot.md / L0 entries take priority on trust
  default_triggers: |
    - User preference: preference, prefer, "I like", habit, "I want"
    - Project: project, repo, codebase, repository
    - Tech stack: Go, Python, MySQL, PostgreSQL, Redis, React, Vue, Docker, Kubernetes
    - Domain: finance, investment, food, travel, health, work, study
    - Memory instruction (strong trigger, MUST write immediately): remember, "please remember", "don't forget", forget, 记住, 要记得, 别忘了, 忘了
  session_header: "## Cortex connected (lang={lang}, vault={vault}, preset={preset})"
  collab_save: After non-trivial findings, use cortex-save to archive; project-specific → domains/, general concepts → concepts/.
  collab_no_direct: |
    Do not write vault files directly. Fallback order:
    L1 = official obsidian CLI (read/create/files/search/move/property/daily, multi-vault via `vault=<name>`), requires Obsidian app running.
    L2 = mcp__obsidian__* (heading/block-anchor patch, canvas, full metadata graph, or when app is not running).
    L3 = direct file write (canvas/excalidraw JSON or other non-markdown, or when L1/L2 are unavailable). **MUST obtain user authorization via AskUserQuestion before writing.**
  collab_block_id: Each H2/H3 section gets a trailing ^cortex-<sha8> block-id for precise ![[note#^cortex-xxx]] references.
  collab_stop_hook: Stop hook auto-archives non-trivial technical findings to log/YYYY-MM/.
  cli_missing_warn: |
    ⚠️ **Official Obsidian CLI not enabled** — cortex L1 primary path unavailable; this session will degrade to L2 (mcp__obsidian__*) and L3 (direct write, needs authorization).
    Enable: Obsidian → Settings → General → Command line interface → Enable. Binary name `obsidian` (macOS auto-symlinks to /usr/local/bin/).
    **Assistant MUST proactively ask the user whether to enable it now** on the first reply, rather than silently degrading.
  l3_authorize_single: |
    cortex is about to write directly to disk (L1/L2 unavailable). Target: {path}
    Action: {action}
    Authorize?
  l3_authorize_batch: |
    cortex is about to batch-write directly to disk (L1/L2 unavailable). {count} files:
    {paths}
    Action: {action}
    Authorize the entire batch?
