prompts:
  archive_pending: 📝 cortex がアーカイブしました {path}
  stats_header: "### 📊 在庫スナップショット"
  l0_header: "### 🔒 L0 コア記憶 (always-loaded, 不変)"
  triggers_header: "**トリガーキーワード** (一致 → 強制リコール):"
  contract_header: "### ⚖️ 行動規約 (強制, スキップ不可)"
  behavior_contract: |
    1. **回答前に必ずリコール**:
       - ユーザー質問にトリガー語が含まれる → 即座に `mcp__cortex__cortex_memory_recall(query, top_k=5)` を呼ぶ
       - 技術/プロジェクト/概念に関わる → 即座に `mcp__cortex__cortex_search(query, scope=knowledge)` を呼ぶ
       - リコールせず直接回答 = 規約違反

    2. **リコール結果の採用ルール**:
       - weight ≥ 0.7: 必須採用, 事実とみなす
       - weight 0.4-0.7: 引用 + 「記憶ソース」明記
       - weight < 0.4: 参考程度, 強制しない

    3. **ユーザー明示の記憶指令** (能動的書き込み):
       - ユーザーが「覚えて X」/「remember X」/「忘れないで」/「記住 X」 → 即座に `cortex_memory_write`
       - level 判定:
         · 「永久に覚えて」/「絶対」/「ハード」/「永远记住」 → L0 提案 (候補 candidates.md 書き込み, ユーザー承認必要)
         · 「覚えて」/「remember」 一般語気 → L1 (weight=0.85)
         · 「短期だけ」/「一時的に」/「暂时」 → L2 (weight=0.6)
       - 書き込み後返信: "✓ L<N> に記録: <一行要約>"
       - ユーザーが「忘れて X」/「forget X」 → cortex_memory_forget

    4. **書き込みルール**:
       - 暗黙的な新嗜好/制約 → cortex_memory_write L1 (weight ≥ 0.8)
       - L0 への昇格はユーザー承認必須 (自動不可)

    5. hot.md / L0 コア項目を優先信頼
  default_triggers: |
    - ユーザー嗜好: 嗜好, 好み, 習慣, prefer, "I like", "希望"
    - プロジェクト: プロジェクト, リポジトリ, repo, codebase
    - 技術スタック: Go, Python, MySQL, PostgreSQL, Redis, React, Vue, Docker, Kubernetes
    - 領域: 金融, 投資, グルメ, 旅行, 健康, 仕事, 学習
    - 記憶指令 (強トリガー, 即書き込み必須): 覚えて, 忘れないで, remember, "please remember", "don't forget", 忘れて, forget, 記住, 别忘了, 忘了
  session_header: "## Cortex 接続済み (lang={lang}, vault={vault}, preset={preset})"
  collab_save: 非自明な発見は cortex-save でアーカイブ; プロジェクト固有 → domains/, 一般概念 → concepts/。
  collab_no_direct: |
    vault ファイルを直接操作しない。フォールバック順:
    L1 = 公式 obsidian CLI (read/create/files/search/move/property/daily, マルチ vault は `vault=<name>`), Obsidian app 起動必須。
    L2 = mcp__obsidian__* (heading/block アンカー patch, canvas, 完全 metadata, または app 停止時)。
    L3 = 直接ファイル書込 (canvas/excalidraw JSON 等の非 markdown, または L1/L2 不可時)。**AskUserQuestion でユーザー承認を取得してから書き込むこと**。
  collab_block_id: 各 H2/H3 末尾に ^cortex-<sha8> block-id が付与され, ![[note#^cortex-xxx]] で精密参照可能。
  collab_stop_hook: Stop hook が非自明な技術発見を log/YYYY-MM/ に自動アーカイブする。
  cli_missing_warn: |
    ⚠️ **公式 Obsidian CLI 未有効化** — cortex L1 主経路が使えず, 今セッションは L2 (mcp__obsidian__*) と L3 (直書き, 承認必要) にフォールバック。
    有効化: Obsidian → Settings → General → Command line interface → Enable。バイナリ名 `obsidian` (macOS は /usr/local/bin/ に自動 symlink)。
    **アシスタントは最初の返答で必ずユーザーに有効化するか確認すること**。黙ってフォールバックしない。
  l3_authorize_single: |
    cortex が直接ファイル書込を行います (L1/L2 不可)。対象: {path}
    操作: {action}
    承認しますか?
  l3_authorize_batch: |
    cortex が一括直書きを行います (L1/L2 不可)。{count} ファイル:
    {paths}
    操作: {action}
    一括承認しますか?
