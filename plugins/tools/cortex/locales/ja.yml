meta:
  lang: ja
  fallback: en
  display: 日本語

dirs:
  # Top-level vault directories (dual namespace + system dirs)
  knowledge: ナレッジ
  memory: メモリ
  dashboard: ダッシュボード
  archive: アーカイブ
  meta: _meta
  templates: _templates
  assets: _assets
  # Knowledge sub-layers (used by lint i18n-path mapping)
  projects: プロジェクト
  sources: ソース
  domains: 領域
  journal: ジャーナル
  reflection: 振り返り
  inbox: 受信箱
  # Alternate flat layout names (recognized but not generated)
  concepts: 概念
  entities: エンティティ
  questions: 質問
  fleeting: 走り書き
  areas: エリア
  resources: 資料
  zettels: zettels
  structure-notes: structure-notes
  references: references

files:
  home: home
  domain_index: _domain
  subdir_index: _index

agent_titles:
  curator: cortex キュレーター
  researcher: cortex リサーチャー
  translator: cortex 翻訳者
  cartographer: cortex 地図製作者
  archivist: cortex アーキビスト
  linker: cortex リンカー
  summarizer: cortex 要約者

prompts:
  archive_pending: 📝 cortex がアーカイブしました {path}
  stats_header: "### 📊 在庫スナップショット"
  l0_header: "### 🔒 L0 コア記憶 (always-loaded, 不変)"
  triggers_header: "**トリガーキーワード** (一致 → 強制リコール):"
  contract_header: "### ⚖️ 行動規約 (強制, スキップ不可)"
  behavior_contract: |
    ⚠️ 強制フロー (ユーザー質問ごと, 最初のツール呼び出しは必須):
    1. cortex_memory_recall(query)
    2. cortex_search(query)
    スキップ = 契約違反。

    ⚠️ 記憶指令 (キーワード一致で即呼び出し):
    - "覚えて X" → memory_write level=L1 weight=0.85
    - "永遠/硬性 X" → candidates.md (L0 候補, ユーザー承認)
    - "暂時 X" → L2
    - "忘れて X" → memory_forget
    - 書き込み後返答: "✓ 記録 L<N>: <brief>"
  default_triggers: "覚えて/忘れて/remember/forget/記住/忘了/嗜好/プロジェクト/Go/Python/MySQL/React/金融/旅行/グルメ (詳細: _meta/triggers.yaml)"
  collab_compact: |
    保存: cortex-save (プロジェクト→domains/, 概念→concepts/);
    書込: L1 obsidian CLI → L2 mcp → L3 直書(承認必要);
    自動 ^cortex-<sha8>; Stop hook が発見をアーカイブ。
  session_header: "## Cortex 接続済み (lang={lang}, vault={vault})"
  collab_save: 非自明な発見は cortex-save でアーカイブ; プロジェクト固有 → domains/, 一般概念 → concepts/。
  collab_no_direct: |
    vault ファイルを直接操作しない。フォールバック順:
    L1 = 公式 obsidian CLI (read/create/files/search/move/property/daily, マルチ vault は `vault=<name>`), Obsidian app 起動必須。
    L2 = mcp__obsidian__* (heading/block アンカー patch, canvas, 完全 metadata, または app 停止時)。
    L3 = 直接ファイル書込 (canvas/excalidraw JSON 等の非 markdown, または L1/L2 不可時)。**AskUserQuestion でユーザー承認を取得してから書き込むこと**。
  collab_block_id: 各 H2/H3 末尾に ^cortex-<sha8> block-id が付与され, ![[note#^cortex-xxx]] で精密参照可能。
  collab_stop_hook: Stop hook が非自明な技術発見を log/YYYY-MM/ に自動アーカイブする。
  cli_missing_warn: |
    ⚠️ **公式 Obsidian CLI 未有効化** — cortex L1 主経路が使えず, 今セッションは L2 (mcp__obsidian__*) と L3 (直書き, 承認必要) にフォールバック。
    有効化: Obsidian → Settings → General → Command line interface → Enable。バイナリ名 `obsidian` (macOS は /usr/local/bin/ に自動 symlink)。
    **アシスタントは最初の返答で必ずユーザーに有効化するか確認すること**。黙ってフォールバックしない。
  l3_authorize_single: |
    cortex が直接ファイル書込を行います (L1/L2 不可)。対象: {path}
    操作: {action}
    承認しますか?
  l3_authorize_batch: |
    cortex が一括直書きを行います (L1/L2 不可)。{count} ファイル:
    {paths}
    操作: {action}
    一括承認しますか?
