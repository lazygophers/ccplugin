meta:
  lang: zh-CN
  fallback: en
  display: 简体中文

dirs:
  # Top-level vault directories (dual namespace + system dirs)
  knowledge: 知识库
  memory: 记忆
  dashboard: 仪表盘
  archive: 归档
  meta: _meta
  templates: _templates
  assets: _assets
  # Knowledge sub-layers (used by lint i18n-path mapping)
  projects: 项目
  sources: 来源
  domains: 领域
  journal: 日记
  reflection: 反思
  inbox: 收件箱
  # Alternate flat layout names (recognized but not generated)
  concepts: 概念
  entities: 实体
  questions: 问题
  fleeting: 临时
  areas: 领域职责
  resources: 资源
  zettels: zettels
  structure-notes: structure-notes
  references: references

files:
  home: home
  domain_index: _domain
  subdir_index: _index

agent_titles:
  curator: cortex 维护员
  researcher: cortex 研究员
  translator: cortex 译者
  cartographer: cortex 制图员
  archivist: cortex 档案员
  linker: cortex 连接员
  summarizer: cortex 总结员

prompts:
  archive_pending: 📝 cortex 已落档 {path}
  stats_header: "### 📊 库存快照"
  l0_header: "### 🔒 L0 核心记忆 (always-loaded, 不可遗忘)"
  triggers_header: "**触发关键词** (匹配则强制召回):"
  contract_header: "### ⚖️ 行为契约 (硬性, 不可跳过)"
  behavior_contract: |
    ⚠️ 强制流程 (每个用户问题, 第一个工具调用必须):
    1. cortex_memory_recall(query) — 召回相关记忆
    2. cortex_search(query) — 搜知识库
    跳过 = 违反契约。

    ⚠️ 记忆指令 (匹配关键词立即调):
    - "记住 X" → memory_write level=L1 weight=0.85
    - "永远/硬性 X" → 写 candidates.md (L0 候选, 用户审批)
    - "暂时 X" → L2
    - "忘了 X" → memory_forget
    - 写后回 "✓ 已记 L<N>: <brief>"
  default_triggers: "记住/忘了/remember/forget/偏好/项目/Go/Python/MySQL/React/金融/旅游/美食 (详细: _meta/triggers.yaml)"
  collab_compact: |
    落档: cortex-save (项目→domains/, 概念→concepts/);
    写文件: L1 obsidian CLI → L2 mcp → L3 直写(需授权);
    自动加 ^cortex-<sha8>; Stop hook 归档技术发现。
  session_header: "## Cortex 已连接 (lang={lang}, vault={vault})"
  collab_save: 非平凡发现完成后用 cortex-save 落档; 项目特定写 domains/, 通用概念写 concepts/。
  collab_no_direct: |
    不直接文件操作。回退顺序:
    L1 = 官方 obsidian CLI (read/create/files/search/move/property/daily, 多 vault 用 `vault=<name>`), 需 Obsidian app 在跑。
    L2 = mcp__obsidian__* (heading/block 锚点 patch、canvas、完整 metadata 场景, 或 app 未跑)。
    L3 = 直接写文件 (canvas/excalidraw json 等非 markdown, 或 L1/L2 均不可用), **必须通过 AskUserQuestion 取得用户授权后方可落盘**。
  collab_block_id: 落档时段落末尾自动加 ^cortex-<sha8>, 后续可精准引用 ![[note#^cortex-xxx]]。
  collab_stop_hook: Stop hook 自动归档非平凡技术发现到 log/YYYY-MM/。
  cli_missing_warn: |
    ⚠️ **官方 Obsidian CLI 未启用** — cortex L1 主路径不可用, 当前会话将降级到 L2 (mcp__obsidian__*) 与 L3 (直接写盘, 需授权)。
    启用方式: 打开 Obsidian → Settings → General → Command line interface → Enable, 安装后二进制名为 `obsidian` (macOS 自动 symlink 到 /usr/local/bin/)。
    **助手须在首次回复时主动询问用户是否要立即启用**, 而不是默默降级。
  l3_authorize_single: |
    cortex 准备直接写盘 (L1/L2 均不可用)。目标文件: {path}
    操作: {action}
    确认授权吗?
  l3_authorize_batch: |
    cortex 准备批量直接写盘 (L1/L2 均不可用)。共 {count} 个文件:
    {paths}
    操作: {action}
    确认整批授权吗?
