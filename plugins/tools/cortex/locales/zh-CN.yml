prompts:
  archive_pending: 📝 cortex 已落档 {path}
  stats_header: "### 📊 库存快照"
  l0_header: "### 🔒 L0 核心记忆 (always-loaded, 不可遗忘)"
  triggers_header: "**触发关键词** (匹配则强制召回):"
  contract_header: "### ⚖️ 行为契约 (硬性, 不可跳过)"
  behavior_contract: |
    1. **回答前必先召回**:
       - 用户提问含触发关键词 → 立即调 `mcp__cortex__cortex_memory_recall(query, top_k=5)`
       - 涉及技术/项目/概念 → 立即调 `mcp__cortex__cortex_search(query, scope=knowledge)`
       - 直接回答不调用 = 违反契约

    2. **召回结果采纳规则**:
       - weight ≥ 0.7: 必须采纳, 视为事实
       - weight 0.4-0.7: 引用 + 标注"记忆来源"
       - weight < 0.4: 可参考, 不强采

    3. **用户显式记忆指令** (主动写入):
       - 用户说"记住 X" / "你要记得 X" / "remember X" / "别忘了" → 立即 `cortex_memory_write`
       - level 判定:
         · "永远记住" / "硬性" / "绝对" → 提议 L0 (写候选 candidates.md, 用户审批)
         · "记住" / "remember" 默认 → L1 (weight=0.85)
         · "短期记一下" / "暂时" → L2 (weight=0.6)
       - 写入后回复: "✓ 已记 L<N>: <brief 一句话>"
       - 用户说"忘了 X" / "forget X" → cortex_memory_forget

    4. **写入规则**:
       - 用户隐式新偏好/约束 → cortex_memory_write L1 (weight ≥ 0.8)
       - 升 L0 必须用户审批 (不可自动)

    5. hot.md / L0 核心条目优先信任
  default_triggers: |
    - 用户偏好: 偏好, 喜好, 习惯, prefer, "I like", "我希望"
    - 项目相关: 项目, 仓库, repo, 工程, codebase
    - 技术栈: Go, Python, MySQL, PostgreSQL, Redis, React, Vue, Docker, Kubernetes
    - 领域: 金融, 投资, 美食, 旅游, 健康, 工作, 学习
    - 记忆指令 (强触发, 必立即写): 记住, 要记得, remember, please remember, 别忘了, don't forget, 忘了, forget
  session_header: "## Cortex 已连接 (lang={lang}, vault={vault}, preset={preset})"
  collab_save: 非平凡发现完成后用 cortex-save 落档; 项目特定写 domains/, 通用概念写 concepts/。
  collab_no_direct: |
    不直接文件操作。回退顺序:
    L1 = 官方 obsidian CLI (read/create/files/search/move/property/daily, 多 vault 用 `vault=<name>`), 需 Obsidian app 在跑。
    L2 = mcp__obsidian__* (heading/block 锚点 patch、canvas、完整 metadata 场景, 或 app 未跑)。
    L3 = 直接写文件 (canvas/excalidraw json 等非 markdown, 或 L1/L2 均不可用), **必须通过 AskUserQuestion 取得用户授权后方可落盘**。
  collab_block_id: 落档时段落末尾自动加 ^cortex-<sha8>, 后续可精准引用 ![[note#^cortex-xxx]]。
  collab_stop_hook: Stop hook 自动归档非平凡技术发现到 log/YYYY-MM/。
  cli_missing_warn: |
    ⚠️ **官方 Obsidian CLI 未启用** — cortex L1 主路径不可用, 当前会话将降级到 L2 (mcp__obsidian__*) 与 L3 (直接写盘, 需授权)。
    启用方式: 打开 Obsidian → Settings → General → Command line interface → Enable, 安装后二进制名为 `obsidian` (macOS 自动 symlink 到 /usr/local/bin/)。
    **助手须在首次回复时主动询问用户是否要立即启用**, 而不是默默降级。
  l3_authorize_single: |
    cortex 准备直接写盘 (L1/L2 均不可用)。目标文件: {path}
    操作: {action}
    确认授权吗?
  l3_authorize_batch: |
    cortex 准备批量直接写盘 (L1/L2 均不可用)。共 {count} 个文件:
    {paths}
    操作: {action}
    确认整批授权吗?
