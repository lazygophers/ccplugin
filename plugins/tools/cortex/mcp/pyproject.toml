[project]
name = "cortex-mcp"
version = "0.1.0"
description = "MCP server for cortex Obsidian knowledge base"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0,<2.0.0",
    "pypdf>=4.0",
    "ebooklib>=0.18",
    "python-docx>=1.1",
]

[project.scripts]
cortex-mcp = "server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools", "lib"]
only-include = ["server.py", "tools", "lib"]
