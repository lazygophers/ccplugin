<!--
  timeline.html — Grok Live Artifacts 风 CSS-only 竖排时间线
  变量占位:
    {{ITEMS}}  由 cortex-dashboard 注入, 每条形如:
               <div style="position:relative;padding-bottom:16px;">
                 <div style="position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;background:#3182ce;border:2px solid #ffffff;box-shadow:0 0 0 2px #3182ce;"></div>
                 <div style="font-size:0.75rem;color:#718096;">{{TIME}}</div>
                 <div style="font-size:0.875rem;font-weight:600;color:#1a202c;">{{TITLE}}</div>
                 <div style="font-size:0.875rem;color:#4a5568;">{{DESC}}</div>
               </div>
  纯 CSS, 不依赖 JS。
-->
<div style="position:relative;padding-left:24px;margin:12px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a202c;">
  <div style="position:absolute;left:8px;top:0;bottom:0;width:2px;background:#e2e8f0;"></div>
  {{ITEMS}}
</div>

<!-- TEMPLATE_END -->
