<!--
  card.html — Grok Live Artifacts 风三段信息卡 (title / desc / footer)
  变量占位:
    {{TITLE}}   卡片标题
    {{DESC}}    主体描述 (单段)
    {{FOOTER}}  脚注 (元数据 / 链接)
-->
<div style="background:#ffffff;border:1px solid #edf2f7;border-radius:12px;padding:16px;margin:8px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a202c;">
  <h3 style="margin:0 0 8px 0;font-size:1.125rem;font-weight:700;border-left:4px solid #3182ce;padding-left:8px;">{{TITLE}}</h3>
  <p style="margin:0;font-size:0.875rem;color:#4a5568;line-height:1.5;">{{DESC}}</p>
  <footer style="margin-top:12px;display:flex;gap:8px;font-size:0.75rem;color:#718096;border-top:1px solid #edf2f7;padding-top:8px;">{{FOOTER}}</footer>
</div>
