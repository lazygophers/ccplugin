<!--
  badge.html — Grok Live Artifacts 风格状态徽章
  变量占位:
    {{LABEL}}  徽章文本 (如 L0 / active / 0.8)
    {{COLOR}}  背景色 (蓝#3182ce / 绿#16a34a / 红#dc2626 / 橙#ea580c / 黄#ca8a04 / 灰#6b7280)
    {{FG}}     前景文本色 (默认 #ffffff)
  用法: 由 cortex-html / cortex-dashboard 注入实际值后内联到 markdown
-->
<span style="display:inline-block;padding:4px 12px;background:{{COLOR}};color:{{FG}};border-radius:12px;font-size:0.875rem;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">{{LABEL}}</span>
