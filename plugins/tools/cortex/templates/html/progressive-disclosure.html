<!--
  progressive-disclosure.html — Grok Live Artifacts 风折叠面板 (3 级嵌套)

    {{L1_SUMMARY}} / {{L1_BODY}}
    {{L2_SUMMARY}} / {{L2_BODY}}
    {{L3_SUMMARY}} / {{L3_BODY}}
  用途: 渐进披露, 默认仅显示 summary, 用户点开展开 body
-->
<details style="background:#ffffff;border:1px solid #edf2f7;border-radius:12px;padding:0;margin:8px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a202c;">
  <summary style="padding:12px 16px;cursor:pointer;font-weight:700;font-size:0.95rem;background:#f7fafc;border-radius:12px;list-style:none;">{{L1_SUMMARY}}</summary>
  <div style="padding:16px;border-top:1px solid #edf2f7;font-size:0.875rem;color:#4a5568;">
    {{L1_BODY}}
    <details style="background:#ffffff;border:1px solid #edf2f7;border-radius:12px;padding:0;margin:8px 0;">
      <summary style="padding:10px 14px;cursor:pointer;font-weight:600;font-size:0.875rem;background:#f7fafc;border-radius:12px;list-style:none;">{{L2_SUMMARY}}</summary>
      <div style="padding:14px;border-top:1px solid #edf2f7;">
        {{L2_BODY}}
        <details style="background:#ffffff;border:1px solid #edf2f7;border-radius:12px;padding:0;margin:8px 0;">
          <summary style="padding:8px 12px;cursor:pointer;font-weight:600;font-size:0.85rem;background:#f7fafc;border-radius:12px;list-style:none;">{{L3_SUMMARY}}</summary>
          <div style="padding:12px;border-top:1px solid #edf2f7;">{{L3_BODY}}</div>
        </details>
      </div>
    </details>
  </div>
</details>
